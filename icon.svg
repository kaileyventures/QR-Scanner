<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0d0e12"/>
  
  <!-- Outer Scanner Frame -->
  <rect x="96" y="96" width="320" height="320" rx="48" fill="none" stroke="url(#grad)" stroke-width="24" stroke-linecap="round"/>
  
  <!-- QR Code styling blocks -->
  <!-- Top Left -->
  <rect x="144" y="144" width="80" height="80" rx="12" fill="#ffffff"/>
  <rect x="164" y="164" width="40" height="40" rx="6" fill="#0d0e12"/>
  
  <!-- Top Right -->
  <rect x="288" y="144" width="80" height="80" rx="12" fill="#ffffff"/>
  <rect x="308" y="164" width="40" height="40" rx="6" fill="#0d0e12"/>
  
  <!-- Bottom Left -->
  <rect x="144" y="288" width="80" height="80" rx="12" fill="#ffffff"/>
  <rect x="164" y="308" width="40" height="40" rx="6" fill="#0d0e12"/>
  
  <!-- Little noise / details for QR aesthetic -->
  <rect x="288" y="288" width="32" height="32" rx="6" fill="url(#grad)"/>
  <rect x="336" y="288" width="32" height="32" rx="6" fill="#ffffff"/>
  <rect x="288" y="336" width="32" height="32" rx="6" fill="#ffffff"/>
  <rect x="336" y="336" width="32" height="32" rx="6" fill="url(#grad)"/>
</svg>
